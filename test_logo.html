
<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0f1729; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif;}
        .container { display: flex; flex-direction: column; align-items: center; }
        .logo { position: relative; width: 192px; height: 192px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; }
        .pestle { position: absolute; width: 80px; height: 80px; color: #93c5fd; z-index: 10; margin-left: -16px; margin-top: -40px; }
        .mortar { position: absolute; width: 112px; height: 112px; color: #3b82f6; z-index: 20; margin-top: 16px; }
        .leaf { position: absolute; width: 64px; height: 64px; color: #2dd4bf; z-index: 30; margin-left: 64px; margin-top: -32px; transform: rotate(15deg); }
    </style>
</head>
<body>
    <div class='container'>
        <div class='logo'>
            <svg class='pestle' viewBox='0 0 24 24'>
                <path d='M17 3 L10 16' stroke='currentColor' stroke-width='4' stroke-linecap='round' />
                <circle cx='17' cy='3' r='3' fill='currentColor' />
            </svg>
            <svg class='mortar' viewBox='0 0 24 24'>
                <path d='M4 10 H20 L17 20 C17 21 15 22 12 22 C9 22 7 21 7 20 L4 10 Z' fill='currentColor' />
                <path d='M2 10 H22' stroke='currentColor' stroke-width='2' stroke-linecap='round' />
                <path d='M12 13 V19 M9 16 H15' stroke='white' stroke-width='2' stroke-linecap='round' />
            </svg>
            <svg class='leaf' viewBox='0 0 24 24'>
                <path d='M12 2 C18 2 22 6 22 12 C22 18 12 22 12 22 C12 22 2 18 2 12 C2 6 6 2 12 2 Z' fill='currentColor' />
                <path d='M12 22 L12 12' stroke='#0f1729' stroke-width='1' stroke-linecap='round' />
            </svg>
        </div>
        <div style='font-size: 48px; font-weight: 900; letter-spacing: 0.1em; color: #38bdf8;'>PROCARE</div>
        <div style='font-size: 24px; font-weight: 300; margin-top: 16px; text-align: center; color: #e0f2fe; line-height: 1.5;'>
            ليست مجرد صيدلية،<br/>
            <span style='font-weight: 600; color: #6ee7b7;'>لكنها عائلة لكل احتياجاتك</span>
        </div>
    </div>
</body>
</html>
